  <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="600" letter-spacing="-1" fill="#C27C35">EG</text>
